name: Deploy to GitHub Pages

# Deploys the single-file app to GitHub Pages on every push to main.
# At build time it injects two repo Secrets into index.html so they never live
# in the repo source:
#   • SETTINGS_PASSWORD  → SHA-256 hash → __SETTINGS_HASH_PLACEHOLDER__
#   • GOOGLE_CLIENT_ID   → verbatim     → __GOOGLE_CLIENT_ID_PLACEHOLDER__
# No npm, no Node, no build tools — it's a static HTML file.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official GitHub Pages deploy actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          SETTINGS_PASSWORD: ${{ secrets.SETTINGS_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${SETTINGS_PASSWORD:-}" ]; then
            echo "::warning::SETTINGS_PASSWORD secret is empty — settings panel will open without a password."
          fi

          # Compute SHA-256 hex of the settings password
          HASH=$(printf '%s' "$SETTINGS_PASSWORD" | sha256sum | cut -d' ' -f1)
          # Mask the derived hash in the logs as a precaution
          echo "::add-mask::$HASH"

          # Inject — '|' delimiter is safe (hash is hex; client ID has no '|')
          sed -i "s|__SETTINGS_HASH_PLACEHOLDER__|${HASH}|g" index.html
          sed -i "s|__GOOGLE_CLIENT_ID_PLACEHOLDER__|${GOOGLE_CLIENT_ID}|g" index.html

          # Fail the build if any placeholder survived (catches typos/renames)
          if grep -q "__SETTINGS_HASH_PLACEHOLDER__\|__GOOGLE_CLIENT_ID_PLACEHOLDER__" index.html; then
            echo "::error::A placeholder was not replaced in index.html"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root (single static file + assets)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
